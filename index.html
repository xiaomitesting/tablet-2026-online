function prevStep() { if (quizStep > 1) { quizStep--; renderQuiz(); } }

// 6. 推薦演算法
// ============================================================
function calculateMatches() {
    return products.map(p => {
        let score = 0, reasons = [], warnings = [];

        // 用途 (30分)
        if (answers.scenario) {
            if (p.scenario.includes(answers.scenario)) { score += 30; reasons.push('匹配使用場景'); }
            else { score += 5; warnings.push('場景不完全匹配'); }
        }
        // 預算 (25分)
        if (answers.budget) {
            if (p.budget === answers.budget) { score += 25; reasons.push('預算內'); }
            else if (answers.budget === 'premium' && p.budget === 'mid') { score += 15; reasons.push('略低於預算'); }
            else if (answers.budget === 'mid' && p.budget === 'low') { score += 12; }
            else { warnings.push('超出預算'); }
        }
        // 尺寸 (20分)
        if (answers.size) {
            if (p.screenType === answers.size) { score += 20; reasons.push('尺寸匹配'); }
            else { warnings.push('尺寸不匹配'); }
        }
        // 優先級 (15分)
        if (answers.priority) {
            switch(answers.priority) {
                case 'performance': if (p.chip.includes('8')||p.chip.includes('9')) { score+=15; reasons.push('旗艦芯片'); } else score+=5; break;
                case 'battery': if (parseInt(p.battery)>=10000) { score+=15; reasons.push('超大電池'); } else score+=5; break;
                case 'display': if (p.size.includes('OLED')||p.size.includes('144Hz')) { score+=15; reasons.push('頂級屏幕'); } else score+=5; break;
                case 'price': if (p.price<=1500) { score+=15; reasons.push('極致性價比'); } else score+=5; break;
                case 'portable': if (p.weight<=300) { score+=15; reasons.push('超輕機身'); } else score+=3; break;
                case 'stylus': if (p.stylus) { score+=15; reasons.push('支持手寫筆'); } else { score+=0; warnings.push('不支持手寫筆'); } break;
            }
        }
        // 配件 (10分)
        if (answers.accessory) {
            if (answers.accessory==='none') score+=10;
            else if (answers.accessory==='stylus'&&p.stylus) { score+=10; reasons.push('手寫筆支持'); }
            else if (answers.accessory==='keyboard') score+=8;
            else if (answers.accessory==='both'&&p.stylus) { score+=10; reasons.push('手寫筆+鍵盤'); }
            else warnings.push('配件不完全匹配');
        }
        score += p.rating * 2;
        return { product:p, score:Math.min(100,Math.round(score)), reasons, warnings };
    }).sort((a,b) => b.score - a.score);
}

function filterCatalog(f) { renderCatalog(f); }
function sortCatalog(s) { currentSort = s; renderCatalog(currentCatalogFilter); }
function sortProducts(arr, key) {
    const s = [...arr];
    switch(key) {
        case 'price-asc': return s.sort((a,b)=>a.price-b.price);
        case 'price-desc': return s.sort((a,b)=>b.price-a.price);
        case 'rating': return s.sort((a,b)=>b.rating-a.rating);
        case 'screen': return s.sort((a,b)=>parseFloat(b.size)-parseFloat(a.size));
        default: return s;
    }
}

                    <p class="text-xs text-gray-400 mt-1">${p.tag}</p>
                    <p class="text-xs text-gray-600 mt-2 line-clamp-2">${p.desc}</p>
                    <div class="flex gap-2 mt-3">
                        <a href="${p.link}" target="_blank" class="flex-1 text-center text-xs font-semibold bg-miOrange text-white py-2 rounded-lg">購買</a>
                        <button onclick="toggleFav('${p.id}')" class="px-3 py-2 border rounded-lg text-sm">💔 移除</button>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

// ============================================================
// 12. 橫向對比
// ============================================================
function toggleCompare(id) {
    const idx = selectedForCompare.indexOf(id);
    if (idx>-1) selectedForCompare.splice(idx,1);
    else { if (selectedForCompare.length>=3) { alert('最多同時對比3款'); return; } selectedForCompare.push(id); }
    updateCompareDrawer();
}

function updateCompareDrawer() {
    const drawer = document.getElementById('compare-drawer');
    const count = document.getElementById('compare-count');
    const chips = document.getElementById('compare-chips');
    count.innerText = selectedForCompare.length;
    if (selectedForCompare.length>0) {
        drawer.classList.remove('translate-y-full');
        chips.innerHTML = selectedForCompare.map(id=>{
            const p=products.find(x=>x.id===id);
            return `<span class="compare-chip inline-flex items-center px-3 py-1.5 rounded-lg text-xs font-semibold bg-orange-100 text-miOrange">${p.name} <button onclick="toggleCompare('${id}')" class="ml-2 font-bold">&times;</button></span>`;
        }).join('');
    } else drawer.classList.add('translate-y-full');
}

function clearCompare() { selectedForCompare=[]; updateCompareDrawer(); renderCatalog(currentCatalogFilter); }

function openCompareModal() {
    if (selectedForCompare.length<2) { alert('請至少勾選2款'); return; }
    const modal = document.getElementById('compare-modal');
    const prods = selectedForCompare.map(id=>products.find(p=>p.id===id));
    const fields = [
        {key:'tag',label:'定位'},{key:'size',label:'螢幕'},{key:'chip',label:'芯片'},
        {key:'battery',label:'電池/充電'},{key:'spec',label:'存儲'},{key:'price',label:'價格',fmt:v=>`HK$${v.toLocaleString()}`},
        {key:'weight',label:'重量',fmt:v=>`${v}g`},{key:'stylus',label:'手寫筆',fmt:v=>v?'✅':'❌'},
        {key:'rating',label:'評分',fmt:v=>`⭐ ${v}`}
    ];
    document.getElementById('compare-table-headers').innerHTML = `<th class="p-3 text-sm font-semibold text-gray-500">規格</th>${prods.map(p=>`<th class="p-3 text-center"><div class="text-miOrange font-bold">${p.name}</div><div class="text-xs text-gray-500">HK$${p.price.toLocaleString()}</div></th>`).join('')}`;
    document.getElementById('compare-table-body').innerHTML = fields.map(f=>`<tr><td class="p-3 font-semibold text-sm text-gray-500 bg-gray-50">${f.label}</td>${prods.map(p=>`<td class="p-3 text-sm text-center">${f.fmt?f.fmt(p[f.key]):p[f.key]}</td>`).join('')}</tr>`).join('');
    modal.classList.remove('hidden');
}

function closeCompareModal() { document.getElementById('compare-modal').classList.add('hidden'); }
</script>
